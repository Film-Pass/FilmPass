name: CI/CD using GitHub Actions & Docker
on:
  push:
    branches: [ "feat-dev-test" ]
  pull_request:
    branches: [ "feat-dev-test" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. 코드 체크아웃
      - uses: actions/checkout@v4

      # 2. JDK 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle wrapper 실행 권한
      - name: Give Gradle wrapper execute permissions
        run: chmod +x ./gradlew

      # 4. Gradle 설치
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 5. Gradle 빌드 (테스트 제외)
      - name: Build with Gradle Wrapper
        run: ./gradlew build -x test

      # 6. Docker 로그인
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 7. Docker 이미지 빌드 및 푸시
      - name: Build and push Docker image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/filmpass
          TAG=${{ github.sha }}
          docker build -t $IMAGE:latest -t $IMAGE:$TAG -f ./Dockerfile .
          docker push $IMAGE:latest
          docker push $IMAGE:$TAG

      # 8. EC2 배포 (docker run -e 최소 환경 변수)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/filmpass
            TAG=${{ github.sha }}
            
            docker pull $IMAGE:$TAG
            docker stop spring-boot-app || true
            docker rm spring-boot-app || true
            
            docker run -d --name spring-boot-app --restart=always -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} \
              -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              $IMAGE:$TAG
            
            docker image prune -f