name: CI/CD using GitHub Actions & Docker Compose

on:
  push:
    branches: ["feat-dev-test"]
  pull_request:
    branches: ["feat-dev-test"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. 소스코드 체크아웃
      - uses: actions/checkout@v4

      # 2. JDK 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle Wrapper 권한 부여
      - name: Grant Gradle Wrapper execute permissions
        run: chmod +x ./gradlew

      # 4. Gradle 설치
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 5. Build (테스트 제외)
      - name: Build with Gradle
        run: ./gradlew build -x test

      # 6. Docker Hub 로그인
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 7. Docker 이미지 빌드 & 푸시
      - name: Build & push Docker image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/filmpass
          TAG=${{ github.sha }}
          docker build -t $IMAGE:$TAG -f ./Dockerfile .
          docker push $IMAGE:$TAG

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # EC2 배포
      - name: Deploy to EC2 with Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Starting deployment..."
            # EC2에서 프로젝트 경로
            mkdir -p ~/howWeather-backend
            cd ~/howWeather-backend

            # 깃에서 최신 코드 가져오기
            git fetch --all
            git reset --hard origin/feat-dev-test

            # docker-compose.yml 파일이 EC2에 있는지 확인
            if [ ! -f docker-compose.yml ]; then
              echo "docker-compose.yml not found! Exiting."
              exit 1
            fi

            # .env 파일 생성
            cat > .env <<EOL
            DB_URL=${{ secrets.SPRING_DATASOURCE_URL }}
            DB_USER=${{ secrets.SPRING_DATASOURCE_USERNAME }}
            DB_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/filmpass:${{ github.sha }}
            EOL

            # 기존 컨테이너 중지 및 삭제
            docker-compose --env-file .env down

            # 새 컨테이너 실행
            docker-compose --env-file .env up -d --build

            # 상태 확인
            docker-compose ps
            echo "Deployment completed successfully!"

