services:
  app:
    image: ${DOCKER_IMAGE}   # <- SHA 태그까지 포함해 외부에서 주입
    container_name: filmpass
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy    # redis에도 healthcheck 추가 필요 (아래 참고)
      elasticsearch:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    restart: unless-stopped
  mysql:
    image: mysql:8.0
    container_name: mysql_server
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: filmpass
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  redis:
    image: redis:7.0
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:                       # <- 추가
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.0
    container_name: es_server
    ports:
      - "9200:9200"
    environment:
      - node.name=es_server
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  kibana:
    image: docker.elastic.co/kibana/kibana:8.6.0
    container_name: kibana_server
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://es_server:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
  zookeeper:
    image: zookeeper:3.7
    container_name: zookeeper_server
    ports:
      - "2181:2181"
    volumes:
      - zk_data:/data
    restart: unless-stopped
volumes:
  mysql_data:
  redis_data:
  es_data:
  zk_data:
