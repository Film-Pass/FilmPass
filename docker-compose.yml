services:
  app:
    image: yoyo99828/filmpass:latest
    container_name: filmpass
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${SPRING_DATASOURCE_URL}
      DB_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      DB_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_HOST: ${REDIS_HOST}   # GitHub Actions에서 전달
      REDIS_PORT: ${REDIS_PORT}   # GitHub Actions에서 전달
    depends_on:
      - redis
      - elasticsearch
    restart: unless-stopped

  redis:
    image: redis:7.0
    container_name: redis_server
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.0
    container_name: es_server
    ports:
      - "9200:9200"
    environment:
      - node.name=es_server
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.6.0
    container_name: kibana_server
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://es_server:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped

  zookeeper:
    image: zookeeper:3.7
    container_name: zookeeper_server
    ports:
      - "2181:2181"
    volumes:
      - zk_data:/data
    restart: unless-stopped

volumes:
  redis_data:
  es_data:
  zk_data:
