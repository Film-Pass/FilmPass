name: CI/CD using GitHub Actions & Docker
on:
  push:
    branches: [ "feat-dev-test" ]
  pull_request:
    branches: [ "feat-dev-test" ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # 1. 소스코드 체크아웃
      - uses: actions/checkout@v4
      # 2. Gradle 캐시 설정 (빌드 속도 향상)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      # 3. Gradle Wrapper 실행 권한 부여
      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x ./gradlew
      # 4. Spring Boot 빌드 (테스트 제외 가능)
      - name: Build with Gradle Wrapper
        run: ./gradlew clean build -x test
      # (선택) 빌드 결과 아티팩트 업로드 (디버깅/확인용)
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # 5. 소스코드 체크아웃(도커 컨텍스트 필요 시)
      - uses: actions/checkout@v4
      # 6. Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # 7. Docker Hub 로그인 (권장: 공식 액션)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      # 8. Docker 이미지 빌드 & 푸시
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/filmpass:latest
          # (선택) 캐시 사용
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # 9. EC2에서 pull & run
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/filmpass:latest
            docker stop filmpass || true
            docker rm filmpass || true
            docker run -d --name filmpass --restart=always -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/filmpass:latest
            docker image prune -a -f














