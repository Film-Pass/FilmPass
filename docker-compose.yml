services:
  app:
    build: .
    container_name: filmpass
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${SPRING_DATASOURCE_URL}
      DB_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      DB_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
    depends_on:
      - redis
      - elasticsearch
    restart: unless-stopped

  redis:
    image: redis:7.0
    container_name: redis_server
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: es_server
    ports:
      - "9200:9200"
    environment:
      - node.name=es_server
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.authc.api_key.enabled=true
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana_server
    ports:
      - "5601:5601"
    environment:
    - ELASTICSEARCH_HOSTS=http://es_server:9200
    - ELASTICSEARCH_USERNAME=${KIBANA_SYSTEM_USERNAME}
    - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
    - XPACK_SECURITY_ENABLED=true
    - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
    depends_on:
      - elasticsearch
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql_server
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  zookeeper:
    image: zookeeper:3.7
    container_name: zookeeper_server
    ports:
      - "2181:2181"
    volumes:
      - zk_data:/data
    restart: unless-stopped

  fleet_server:
    image: docker.elastic.co/beats/elastic-agent:8.11.1
    container_name: fleet_server
    environment:
      - FLEET_SERVER_ENABLE=1
      - FLEET_ENROLL=1
      - FLEET_URL=http://kibana_server:5601
      - FLEET_SERVER_SERVICE_TOKEN=AAEAAWVsYXN0aWMvZmxlZXQtc2VydmVyL3Rva2VuLTE3NTU2MDA1NjkxNDQ6YU53QkhqWW9RaDZlVTZaUTYxNmp1dw
      - ELASTICSEARCH_HOST=http://es_server:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - FLEET_SERVER_CERT=/usr/share/elastic-agent/certs/fleet.crt
      - FLEET_SERVER_CERT_KEY=/usr/share/elastic-agent/certs/fleet.key
    ports:
      - "8220:8220"
    volumes:
      - ./certs:/usr/share/elastic-agent/certs:ro
    depends_on:
      - elasticsearch
      - kibana
    restart: unless-stopped

volumes:
  redis_data:
  es_data:
  mysql_data:
  zk_data:

