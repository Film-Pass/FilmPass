name: CI/CD using GitHub Actions & Docker Compose
on:
  push:
    branches: ["feat-dev-test"]
  pull_request:
    branches: ["feat-dev-test"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Grant Gradle Wrapper execute permissions
        run: chmod +x ./gradlew
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle
        run: ./gradlew build -x test
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build & push Docker image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/filmpass
          TAG=${{ github.sha }}
          docker build -t $IMAGE:$TAG -f ./Dockerfile .
          docker push $IMAGE:$TAG
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to EC2 with Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            echo "[1/6] Move to project dir"
            cd ~/filmPass-backend   # <-- 실제 서버의 프로젝트 디렉토리로 수정하세요
            echo "[2/6] Sync repo"
            git fetch --all
            git reset --hard origin/feat-dev-test
            IMAGE=${{ secrets.DOCKER_USERNAME }}/filmpass:${{ github.sha }}
            echo "[3/6] Pull new image"
            docker pull $IMAGE
            echo "[4/6] Create/Update .env"
            cat > .env <<EOF
            DOCKER_IMAGE=$IMAGE
            DB_URL=${{ secrets.SPRING_DATASOURCE_URL }}
            DB_USER=${{ secrets.SPRING_DATASOURCE_USERNAME }}
            DB_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            EOF
            echo "[5/6] Recreate services"
            docker-compose down
            docker-compose up -d --remove-orphans
            echo "[6/6] Status"
            docker-compose ps
            docker images | grep filmpass | head -n 5
