name: CI/CD using GitHub Actions & Docker Compose

on:
  push:
    branches: ["dev-test"]
  pull_request:
    branches: ["dev-test"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 소스코드 체크아웃
      - uses: actions/checkout@v4

      # 2. Gradle 캐시 설정
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-home-v1-linux-build-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-home-v1-linux-

      # 3. Gradle Wrapper 실행 권한
      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x ./gradlew

      # 4. Spring Boot 빌드 (테스트 제외 가능)
      - name: Build with Gradle Wrapper
        run: ./gradlew clean build -x test

      # 5. 빌드 산출물 업로드
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/FilmPass-0.0.1-SNAPSHOT.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # 1. 소스코드 체크아웃 (Dockerfile / docker-compose.yml 가져오기)
      - uses: actions/checkout@v4

      # 2. EC2 접속 후 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/your-project-folder
            # 최신 이미지 빌드 & pull
            docker-compose pull
            # 기존 컨테이너 중지 및 제거
            docker-compose down
            # 환경변수 전달 후 컨테이너 실행
            REDIS_HOST=${{ secrets.REDIS_HOST }} \
            REDIS_PORT=${{ secrets.REDIS_PORT }} \
            SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} \
            SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} \
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} \
            ELASTICSEARCH_USERNAME=${{ secret.ELASTICSEARCH_USERNAME }} \
            ELASTICSEARCH_PASSWORD=${{ secret.ELASTICSEARCH_PASSWORD }} \
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} 
            
            docker-compose up -d --build
            # 불필요한 이미지 정리
            docker image prune -a -f
