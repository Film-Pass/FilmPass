version: "3.8"

services:
  app:
    build: .
    container_name: filmpass
    ports: ["8080:8080"]
    environment:
      DB_URL: ${SPRING_DATASOURCE_URL}
      DB_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      DB_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      ELASTICSEARCH_HOST: ${ELASTICSEARCH_HOST}
      SPRING_ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME}
      SPRING_ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
    depends_on:
      - mysql
      - redis
      - elasticsearch
      - apm_agent
    restart: unless-stopped

  redis:
    image: redis:7.0
    container_name: redis_server
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: es_server
    ports: ["9200:9200"]
    environment:
      - node.name=es_server
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.authc.api_key.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana_server
    ports: ["5601:5601"]
    environment:
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - ELASTICSEARCH_USERNAME=${KIBANA_SYSTEM_USERNAME}
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - XPACK_SECURITY_ENABLED=true
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
    depends_on: [elasticsearch]
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql_server
    ports: ["3306:3306"]
    environment:
      - MYSQL_DATABASE=filmpass
      - MYSQL_USER=${SPRING_DATASOURCE_USERNAME}
      - MYSQL_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
    command: ["--character-set-server=utf8mb4","--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  zookeeper:
    image: zookeeper:3.7
    container_name: zookeeper_server
    ports: ["2181:2181"]
    volumes: ["zk_data:/data"]
    restart: unless-stopped

volumes:
  redis_data:
  es_data:
  mysql_data:
  zk_data:
