name: CI/CD using GitHub Actions & Docker Compose

on:
  push:
    branches: ["feat-dev-test"]
  pull_request:
    branches: ["feat-dev-test"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Gradle Wrapper execute permissions
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & push Docker image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/filmpass
          TAG=${{ github.sha }}
          docker build -t $IMAGE:$TAG -f ./Dockerfile .
          docker push $IMAGE:$TAG

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 with Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Starting deployment..."
            cd ~/howWeather-backend
            git fetch --all
            git reset --hard origin/feat-dev-test

            IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/filmpass:${{ github.sha }}

            echo "Stopping old service..."
            docker-compose down

            echo "Running new service with environment variables..."
            SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} \
            SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} \
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} \
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
            DOCKER_IMAGE=$IMAGE \
            docker-compose up -d --build

            echo "Checking containers..."
            docker-compose ps
            echo "Deployment completed successfully!"
