name: CI/CD using GitHub Actions & Docker

on:
  push:
    branches: [ "feat-dev-test" ]
  pull_request:
    branches: [ "feat-dev-test" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. 소스코드 체크아웃
      - uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle wrapper 실행 권한
      - name: Give Gradle wrapper execute permissions
        run: chmod +x ./gradlew

      # 4. Gradle 설치
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 5. application.properties 생성 (main)
      - name: Generate application.properties (main)
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_PROPERTIES }}" > src/main/resources/application.properties

      # 6. application.properties 생성 (test)
      - name: Generate application.properties (test)
        run: |
          mkdir -p src/test/resources
          echo "${{ secrets.APPLICATION_TEST_PROPERTIES }}" > src/test/resources/application.properties

      # 7. Gradle Build (테스트 제외)
      - name: Build with Gradle Wrapper
        run: ./gradlew build -x test

      # 8. JAR 아티팩트 업로드
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # 1. 소스코드 체크아웃
      - uses: actions/checkout@v4

      # 2. 빌드 산출물 다운로드
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      # 3. Docker 로그인
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Docker 이미지 빌드 & 푸시
      - name: Build & Push Docker image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/filmpass
          TAG=${{ github.sha }}
          DOCKER_BUILDKIT=1 docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -t $IMAGE:latest -t $IMAGE:$TAG .
          docker push $IMAGE:latest
          docker push $IMAGE:$TAG

      # 5. EC2 배포 (Docker Compose 없이)
      - name: Deploy to EC2 without Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/filmpass:${{ github.sha }}

            docker stop spring-boot-app || true
            docker rm spring-boot-app || true

            docker run -d --name spring-boot-app --restart=always -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} \
              -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              $IMAGE

            docker image prune -f
