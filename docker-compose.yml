version: "3.8"
services:
  app:
    image: filmpass-app-image
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}         # 외부 MySQL 주소
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: VGhpcyBpcyBhIHZlcnkgc2VjdXJlIGtleSBmb3IgdGVzdGluZy4uLi4xMjM0
      SPRING_REDIS_HOST: ${REDIS_HOST}         # 외부 Redis 주소
      SPRING_REDIS_PORT: ${REDIS_PORT}
    ports:
      - "8080:8080"                            # 포트 충돌 방지용 변경
    depends_on:
      - elasticsearch
      - kafka
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data    # 데이터 저장용 볼륨(호스트 디스크 제한 가능)
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.9.0
    container_name: kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    volumes:
      - kafkadata:/bitnami/kafka                 # 데이터 저장용 볼륨
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  esdata:
  kafkadata: