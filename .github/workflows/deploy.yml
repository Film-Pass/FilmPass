name: CI/CD using GitHub Actions & Docker

on:
  push:
    branches: [ "feat-dev-test" ]
  pull_request:
    branches: [ "feat-dev-test" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. 소스코드 체크아웃
      - uses: actions/checkout@v4

      # 2. Gradle 캐시 설정 (빌드 속도 향상)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. Gradle Wrapper 실행 권한 부여
      - name: Grant execute permission for Gradle Wrapper
        run: chmod +x ./gradlew

      # 5. Spring Boot 빌드 (테스트 제외 가능)
      - name: Build with Gradle Wrapper
        run: ./gradlew clean build -x test

      # 6. Docker Hub 로그인
      - name: Docker login
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      # 7. Docker 이미지 빌드 & 푸시
      - name: Build & Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/filmpass:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/filmpass:latest

      # 8. EC2에서 pull & run
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{  secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/filmpass:latest
            docker stop filmpass || true
            docker rm filmpass || true
            docker run -d --name filmpass -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/filmpass:latest
            docker image prune -a -f
