name: CI/CD Deploy with Docker

on:
  push:
    branches: [ feat-dev-test ]
  pull_request:
    branches: [ feat-dev-test ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ✅ 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # ✅ Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Docker 이미지 빌드 및 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: yoyo99828/filmpass:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # ✅ EC2에서 이미지 pull & 컨테이너 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull yoyo99828/filmpass:latest
            docker stop filmpass || true
            docker rm filmpass || true
            docker run -d --name filmpass -p 8080:8080 yoyo99828/filmpass:latest